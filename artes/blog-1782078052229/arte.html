<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .art-canvas {
    position: relative;
    width: 540px;
    height: 675px;
    overflow: hidden;
    background: #02050A;
  }
  .art-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top right;
  }
  .art-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(2,5,10,0.05) 0%, rgba(2,5,10,0.65) 45%, rgba(2,5,10,0.97) 100%);
  }
  .diagonal-accent {
    position: absolute;
    top: 38%;
    left: 36px;
    width: 3px;
    height: 180px;
    background: #14A8F4;
    transform: rotate(-15deg);
    transform-origin: top center;
  }
  .art-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 42px 80px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .logo-cyberfest {
    width: 110px;
    margin-bottom: 20px;
  }
  .headline {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #F6F8FF;
    line-height: 1.2;
    max-width: 65%;
  }
  .subtitulo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 12.5px;
    color: #94A0B8;
    margin-top: 10px;
    border-bottom: 1px solid #14A8F4;
    padding-bottom: 8px;
    max-width: 60%;
  }
  .ecosystem {
    position: absolute;
    bottom: 22px;
    left: 42px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .ecosystem img {
    height: 33px;
    filter: brightness(0) invert(1);
  }
</style>
