
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CybersecFEST — Arte Final</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    padding: 40px 20px;
  }
  .label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #14A8F4;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .art-canvas {
    position: relative;
    width: 540px;
    height: 675px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .art-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center right;
  }
  .art-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(2,5,10,0.93) 0%,
        rgba(2,5,10,0.82) 35%,
        rgba(2,5,10,0.28) 62%,
        rgba(2,5,10,0.00) 100%
      ),
      linear-gradient(to top,
        rgba(2,5,10,0.75) 0%,
        rgba(2,5,10,0.0) 35%
      );
  }
  .art-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px 30px 26px 34px;
  }

  /* Logo colorido — SEM nenhum filtro */
  .logo-img {
    height: 64px;
    width: auto;
    object-fit: contain;
    object-position: left center;
    max-width: 220px;
    display: block;
    margin-bottom: 16px;
    /* NENHUM filter — cores originais preservadas */
  }

  .center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 58%;
    padding: 10px 0;
  }
  .headline {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: 29px;
    line-height: 1.08;
    text-transform: uppercase;
    color: #F6F8FF;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .headline .blue { color: #14A8F4; }
  .divider {
    width: 36px; height: 2px;
    background: linear-gradient(90deg, #14A8F4, transparent);
    margin-bottom: 13px;
  }
  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-style: normal;
    font-size: 12px;
    line-height: 1.65;
    color: #D5D8ED;
    max-width: 240px;
    letter-spacing: 0.01em;
  }

  .bottom {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 65%;
  }
  .cta-pill {
    display: inline-block;
    width: fit-content;
    background: rgba(20,168,244,0.13);
    border: 1px solid rgba(20,168,244,0.38);
    color: #14A8F4;
    font-family: 'Montserrat', sans-serif;
    font-size: 7px; font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 5px 12px;
  }

  /* Logos ecossistema — brancos, 30px */
  .ecosystem {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-top: 10px;
    border-top: 1px solid rgba(246,248,255,0.1);
  }
  .eco-img {
    height: 30px;
    width: auto;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.75;
    max-width: 90px;
  }
  .eco-sep {
    width: 1px; height: 22px;
    background: rgba(246,248,255,0.15);
    flex-shrink: 0;
  }

  .city-vertical {
    position: absolute;
    right: 13px; bottom: 85px;
    writing-mode: vertical-rl;
    font-family: 'Montserrat', sans-serif;
    font-size: 6.5px; font-weight: 300;
    letter-spacing: 0.32em;
    color: rgba(20,168,244,0.30);
    text-transform: uppercase;
  }

  .toolbar { margin-top: 18px; display: flex; gap: 10px; }
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 9px 18px; border: 1px solid;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
  }
  .btn-secondary { border-color: rgba(246,248,255,0.2); color: #D5D8ED; }
  .info {
    margin-top: 12px; font-size: 9px;
    color: #94A0B8; letter-spacing: 0.1em; text-align: center;
  }
</style>
</head>
<body>

<div class="label">Arte Final — Aguardando Aprovação</div>

<div class="art-canvas">
  <img class="art-bg" src="premium_social_media_post_for_cybersecfe_2246b567.png" alt="Arte">
  <div class="art-overlay"></div>
  <div class="art-content">

    <div style="height:8px"></div>

    <!-- Logo colorido ACIMA da headline, sem filtro -->
    <div class="center-block">
      <img class="logo-img" src="../../assets/logo-cyberfest.png" alt="CybersecFEST">
      <h1 class="headline">
        O MELHOR <span class="blue">ROI</span><br>
        NÃO ESTÁ<br>
        NO ANÚNCIO.<br>
        ESTÁ NA <span class="blue">SALA<br>CERTA.</span>
      </h1>
      <div class="divider"></div>
      <p class="subtitle">O CybersecFEST coloca sua empresa dentro das conversas que movem o mercado de segurança no Brasil.</p>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <div class="cta-pill">Seja patrocinador 2026</div>
      <div class="ecosystem">
        <img class="eco-img" src="../../assets/logo-devops.webp" alt="DevOps Bootcamp">
        <div class="eco-sep"></div>
        <img class="eco-img" src="../../assets/logo-iam.webp" alt="IAM Tech Day">
        <div class="eco-sep"></div>
        <img class="eco-img" src="../../assets/logo-alcatraz.webp" alt="Alcatraz Security">
      </div>
    </div>

  </div>
  <div class="city-vertical">Brasil · 2026</div>
</div>

<div class="toolbar">
  <button class="btn btn-secondary" onclick="window.print()">🖨 Imprimir / PDF</button>
</div>
<div class="info">Arte Final · CybersecFEST 2026 · Feed Vertical 1080×1350px</div>

</body>
</html>
