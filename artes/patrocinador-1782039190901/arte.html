
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CybersecFEST 2026 — Arte Patrocínio</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat+Alternates:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  /* Font roles */
  .font-title { font-family: 'Ubuntu', sans-serif; }
  .font-subtitle { font-family: 'Montserrat', sans-serif; }

  .canvas {
    width: 540px;
    height: 675px;
    position: relative;
    background: #02050A;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Background gradients */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 70% at 80% 50%, rgba(6,18,34,0.95) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 100% 30%, rgba(0,183,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 30% 40% at 90% 80%, rgba(20,168,244,0.06) 0%, transparent 50%),
      linear-gradient(135deg, #02050A 0%, #061222 60%, #062B52 100%);
  }

  /* Bokeh particles */
  .particles {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle 2px at 70% 20%, rgba(0,183,255,0.6) 0%, transparent 100%),
      radial-gradient(circle 1px at 85% 35%, rgba(20,168,244,0.8) 0%, transparent 100%),
      radial-gradient(circle 3px at 65% 60%, rgba(0,183,255,0.3) 0%, transparent 100%),
      radial-gradient(circle 1px at 90% 55%, rgba(20,168,244,0.5) 0%, transparent 100%),
      radial-gradient(circle 2px at 75% 75%, rgba(0,183,255,0.4) 0%, transparent 100%),
      radial-gradient(circle 1px at 60% 15%, rgba(20,168,244,0.6) 0%, transparent 100%),
      radial-gradient(circle 4px at 55% 45%, rgba(6,43,82,0.8) 0%, transparent 100%),
      radial-gradient(circle 1px at 92% 68%, rgba(0,183,255,0.7) 0%, transparent 100%),
      radial-gradient(circle 2px at 78% 88%, rgba(20,168,244,0.4) 0%, transparent 100%);
  }

  /* Digital grid lines */
  .grid-lines {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      linear-gradient(rgba(20,168,244,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,168,244,1) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Blue light glow right side */
  .glow-right {
    position: absolute;
    right: -30px;
    top: 20%;
    width: 300px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(20,168,244,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Chess piece area */
  .chess-piece-area {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-55%);
    width: 220px;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chess-king {
    font-size: 180px;
    line-height: 1;
    filter:
      drop-shadow(0 0 30px rgba(20,168,244,0.8))
      drop-shadow(0 0 60px rgba(0,183,255,0.4))
      drop-shadow(0 20px 40px rgba(0,0,0,0.9));
    color: transparent;
    background: linear-gradient(135deg, #a8c8e8 0%, #d4e8f4 30%, #14A8F4 50%, #8ab4d4 70%, #c0d8ec 100%);
    -webkit-background-clip: text;
    background-clip: text;
    opacity: 0.9;
  }

  /* Reflection */
  .chess-reflection {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(20,168,244,0.3) 0%, transparent 70%);
    filter: blur(8px);
  }

  /* Left content area */
  .content {
    position: absolute;
    left: 0;
    top: 0;
    width: 58%;
    height: 100%;
    padding: 36px 20px 28px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 10;
  }

  /* Logo */
  .logo {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .logo-cybersec {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: #F6F8FF;
    text-transform: uppercase;
  }

  .logo-fest {
    font-family: 'Montserrat Alternates', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: #14A8F4;
  }

  /* Headline */
  .headline-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 0;
  }

  .headline {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #F6F8FF;
    margin-bottom: 16px;
  }

  .headline .blue {
    color: #14A8F4;
  }

  .line-divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #14A8F4, transparent);
    margin-bottom: 14px;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 9.5px;
    line-height: 1.6;
    color: #D5D8ED;
    font-style: italic;
    letter-spacing: 0.02em;
    max-width: 220px;
  }

  /* Bottom area */
  .bottom {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cta-tag {
    display: inline-block;
    background: rgba(20,168,244,0.12);
    border: 1px solid rgba(20,168,244,0.3);
    color: #14A8F4;
    font-family: 'Montserrat', sans-serif;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 10px;
    width: fit-content;
  }

  /* Ecosystem logos */
  .ecosystem {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 6px;
    border-top: 1px solid rgba(246,248,255,0.08);
  }

  .eco-logo {
    font-size: 6.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(246,248,255,0.45);
    text-transform: uppercase;
    line-height: 1.3;
  }

  .eco-sep {
    width: 1px;
    height: 18px;
    background: rgba(246,248,255,0.12);
  }

  /* Right side city text */
  .city-text {
    position: absolute;
    right: 14px;
    bottom: 80px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 7px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: rgba(20,168,244,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">
  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="particles"></div>
  <div class="grid-lines"></div>
  <div class="glow-right"></div>

  <!-- Chess piece -->
  <div class="chess-piece-area">
    <div class="chess-king">♔</div>
    <div class="chess-reflection"></div>
  </div>

  <!-- Main content (left side) -->
  <div class="content">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-cybersec">cybersec</span>
      <span class="logo-fest">fest</span>
    </div>

    <!-- Headline block -->
    <div class="headline-block">
      <h1 class="headline">
        O MELHOR <span class="blue">ROI</span><br>
        NÃO ESTÁ<br>
        NO ANÚNCIO.<br>
        ESTÁ NA <span class="blue">SALA<br>
        CERTA.</span>
      </h1>
      <div class="line-divider"></div>
      <p class="subtitle">O CybersecFEST coloca sua empresa dentro das conversas que movem o mercado de segurança no Brasil.</p>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <div class="cta-tag">Seja patrocinador 2026</div>
      <div class="ecosystem">
        <div class="eco-logo">DevOps<br>Bootcamp</div>
        <div class="eco-sep"></div>
        <div class="eco-logo">IAM<br>Tech Day</div>
        <div class="eco-sep"></div>
        <div class="eco-logo">Alcatraz<br>Security</div>
      </div>
    </div>
  </div>

  <!-- City text vertical -->
  <div class="city-text">Brasil · 2026</div>
</div>
</body>
</html>
